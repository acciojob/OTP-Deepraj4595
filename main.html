<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OTP Verification</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }

    #verification_heading {
      font-size: 28px;
      font-weight: bold;
    }

    #verification_subtext {
      color: gray;
      margin-bottom: 20px;
    }

    .code-container {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .code {
      width: 40px;
      height: 50px;
      font-size: 24px;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .code:focus {
      border-color: blue;
      outline: none;
    }
  </style>
</head>

<body>

  <h1 id="verification_heading">Verify Your Account</h1>
  <p id="verification_subtext">Enter the 6-digit OTP sent to your device</p>

  <div class="code-container">
    <input type="text" maxlength="1" class="code" id="code-1">
    <input type="text" maxlength="1" class="code" id="code-2">
    <input type="text" maxlength="1" class="code" id="code-3">
    <input type="text" maxlength="1" class="code" id="code-4">
    <input type="text" maxlength="1" class="code" id="code-5">
    <input type="text" maxlength="1" class="code" id="code-6">
  </div>

  <script>
    const codes = document.querySelectorAll(".code");

    codes[0].focus();

    codes.forEach((code, index) => {

      code.addEventListener("input", (e) => {
        const value = e.target.value;

        // allow only digits
        if (!/^[0-9]$/.test(value)) {
          e.target.value = "";
          return;
        }

        // move forward
        if (index < codes.length - 1) {
          codes[index + 1].focus();
        }
      });

      code.addEventListener("keydown", (e) => {
        if (e.key === "Backspace") {

          if (code.value === "") {
            if (index > 0) {
              codes[index - 1].focus();
            }
          } else {
            code.value = "";
            e.preventDefault(); // important for test cases
          }
        }
      });

    });
  </script>

</body>
</html>
